name: Keep Render app awake

# Render's free tier spins a service down after ~15 min of inactivity, causing a
# 30–60s "waking up" screen on the next visit. This workflow pings the app's
# health endpoint on a schedule so it never goes idle.
#
# One-time setup: add a repository *variable* named RENDER_URL with your app's
# base URL (no trailing slash), e.g. https://task-manager-xxxx.onrender.com
#   GitHub repo → Settings → Secrets and variables → Actions → Variables → New

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (extra margin vs GitHub's schedule delays)
  workflow_dispatch: {} # lets you run it manually from the Actions tab

# If a run is still going when the next is scheduled, skip the new one.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/health
        run: |
          URL="${{ vars.RENDER_URL }}"
          if [ -z "$URL" ]; then
            echo "::error::RENDER_URL variable is not set. Add it under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          URL="${URL%/}"  # strip any trailing slash
          echo "Pinging $URL/api/health"

          # Retry a few times so a cold-start (which can take ~60s) doesn't fail the run.
          for attempt in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL/api/health" || echo "000")
            echo "Attempt $attempt → HTTP $code"
            if [ "$code" != "000" ] && [ "$code" -lt 500 ]; then
              echo "Service is awake."
              exit 0
            fi
            echo "Not ready yet, waiting 15s…"
            sleep 15
          done

          echo "::error::Service did not respond successfully after retries."
          exit 1
